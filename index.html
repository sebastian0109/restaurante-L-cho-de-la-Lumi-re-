<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RestaurOS — Sistema de Gestión</title>

  <!-- Bootstrap 5.3 -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Estilos propios -->
  <link rel="stylesheet" href="css/styles.css">

  <style>
    .login-page { animation: bgPulse 8s ease infinite alternate; }
    @keyframes bgPulse {
      from { background-position: 0% 50%; }
      to { background-position: 100% 50%; }
    }
  </style>
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <!-- Logo -->
    <div class="login-logo"><span>🍽️</span></div>
    <h2 class="text-center fw-bold mb-1" style="font-family:'Sora',sans-serif;">RestaurOS</h2>
    <p class="text-center text-muted mb-4" style="font-size:0.875rem;">Sistema de Gestión de Restaurante</p>

    <!-- Formulario -->
    <div id="login-error" class="alert alert-danger d-none align-items-center gap-2" role="alert">
      <i class="bi bi-exclamation-circle-fill"></i>
      <span id="login-error-msg">Credenciales inválidas</span>
    </div>

    <div class="mb-3">
      <label class="form-label fw-semibold" for="email">Correo electrónico</label>
      <div class="input-group">
        <span class="input-group-text bg-light border-end-0"><i class="bi bi-envelope text-muted"></i></span>
        <input type="email" class="form-control border-start-0" id="email" placeholder="tu@restaurante.com" autocomplete="email">
      </div>
    </div>

    <div class="mb-4">
      <label class="form-label fw-semibold" for="password">Contraseña</label>
      <div class="input-group">
        <span class="input-group-text bg-light border-end-0"><i class="bi bi-lock text-muted"></i></span>
        <input type="password" class="form-control border-start-0 border-end-0" id="password" placeholder="••••••••" autocomplete="current-password">
        <button class="input-group-text bg-light border-start-0" type="button" id="toggle-pass">
          <i class="bi bi-eye text-muted" id="eye-icon"></i>
        </button>
      </div>
    </div>

    <button class="btn btn-primary w-100 py-2 fw-semibold mb-4" id="btn-login" onclick="handleLogin()">
      <span id="btn-login-text">Iniciar sesión</span>
      <span id="btn-login-spinner" class="spinner-border spinner-border-sm ms-2 d-none"></span>
    </button>

    <!-- Credenciales de demo -->
    <div class="demo-creds">
      <div class="text-muted fw-semibold mb-2 text-center" style="font-size:0.75rem;text-transform:uppercase;letter-spacing:0.05em;">
        <i class="bi bi-lightning-fill text-warning me-1"></i>Acceso Rápido
      </div>
      <div class="row g-1" id="demo-buttons">
        <!-- Se generan dinámicamente -->
      </div>
    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script type="module">
  import { AuthService } from './services/auth.js';

  // Redirigir si ya está autenticado
  if (AuthService.isAuthenticated()) {
    window.location.href = 'dashboard.html';
  }

  // Credenciales de demo
  const demos = [
    { label: "Admin", email: "admin@resto.com", pass: "admin123", color: "danger" },
    { label: "Dueño", email: "dueno@resto.com", pass: "dueno123", color: "dark" },
    { label: "Jefe Meseros", email: "jefe.meseros@resto.com", pass: "jm123", color: "primary" },
    { label: "Jefe Cocina", email: "jefe.cocina@resto.com", pass: "jc123", color: "warning" },
    { label: "Mesero", email: "mesero1@resto.com", pass: "m123", color: "success" },
    { label: "Cocinero", email: "cocinero1@resto.com", pass: "c123", color: "info" },
    { label: "Portero", email: "portero1@resto.com", pass: "p123", color: "secondary" },
  ];

  const cont = document.getElementById("demo-buttons");
  demos.forEach(d => {
    const btn = document.createElement("div");
    btn.className = "col-6";
    btn.innerHTML = `<div class="cred-item" onclick="fillDemo('${d.email}','${d.pass}')">
      <span class="badge bg-${d.color} me-1">${d.label}</span>
      <small class="text-muted">${d.email}</small>
    </div>`;
    cont.appendChild(btn);
  });

  window.fillDemo = (email, pass) => {
    document.getElementById("email").value = email;
    document.getElementById("password").value = pass;
    document.getElementById("email").focus();
  };

  window.handleLogin = async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;
    const errDiv = document.getElementById("login-error");
    const errMsg = document.getElementById("login-error-msg");
    const btnText = document.getElementById("btn-login-text");
    const btnSpin = document.getElementById("btn-login-spinner");
    const btn = document.getElementById("btn-login");

    errDiv.classList.add("d-none");
    if (!email || !password) {
      errMsg.textContent = "Completa todos los campos";
      errDiv.classList.remove("d-none");
      return;
    }

    // Loading state
    btn.disabled = true;
    btnText.textContent = "Verificando...";
    btnSpin.classList.remove("d-none");

    const res = await AuthService.login(email, password);

    btn.disabled = false;
    btnText.textContent = "Iniciar sesión";
    btnSpin.classList.add("d-none");

    if (res.ok) {
      btnText.textContent = "¡Acceso exitoso! Redirigiendo...";
      btn.classList.replace("btn-primary", "btn-success");
      setTimeout(() => window.location.href = "dashboard.html", 800);
    } else {
      errMsg.textContent = res.error || "Credenciales inválidas";
      errDiv.classList.remove("d-none");
      document.getElementById("password").value = "";
      document.getElementById("password").focus();
    }
  };

  // Enter key
  document.getElementById("password").addEventListener("keydown", e => {
    if (e.key === "Enter") window.handleLogin();
  });

  // Toggle password
  document.getElementById("toggle-pass").addEventListener("click", () => {
    const inp = document.getElementById("password");
    const icon = document.getElementById("eye-icon");
    if (inp.type === "password") {
      inp.type = "text";
      icon.className = "bi bi-eye-slash text-muted";
    } else {
      inp.type = "password";
      icon.className = "bi bi-eye text-muted";
    }
  });
</script>

</body>
</html>
